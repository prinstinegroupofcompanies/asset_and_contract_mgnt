services:
  - type: web
    name: acms-api
    runtime: node
    plan: starter
    buildCommand: cd server && npm install --production
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_TYPE
        value: postgresql
      - key: DB_SSL
        value: "true"
      - key: DB_HOST
        fromDatabase:
          name: acms-database
          property: host
      - key: DB_PORT
        fromDatabase:
          name: acms-database
          property: port
      - key: DB_NAME
        fromDatabase:
          name: acms-database
          property: database
      - key: DB_USER
        fromDatabase:
          name: acms-database
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: acms-database
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: SESSION_SECRET
        generateValue: true
      - key: BCRYPT_ROUNDS
        value: 12
      # Set after Vercel deploy: https://your-app.vercel.app
      - key: CLIENT_URL
        sync: false

databases:
  - name: acms-database
    plan: starter
    databaseName: acms
    user: acms_user
